<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flex box</title>

    <style>
      .flex-container {
        display: flex;
        gap: 10px;
        flex-direction: row;
        justify-content: space-between;

        align-items: center;
      }

      ul {
        display: flex;
        gap: 10px;
        flex-direction: row;
      }
    </style>
  </head>
  <body>
    <div class="flex-container">
      <h1>logo</h1>
      <ul>
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
      </ul>
    </div>
  </body>
</html>
