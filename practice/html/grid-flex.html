<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SaaS Dashboard</title>
    <link rel="stylesheet" href="../css/grid-flex.css" />
  </head>
  <body>
    <div class="dashboard">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar__logo">SaaS Pro</div>

        <nav class="sidebar__nav">
          <a href="#" class="sidebar__link"> Dashboard </a>

          <a href="#" class="sidebar__link"> Analytics </a>

          <a href="#" class="sidebar__link"> Reports </a>

          <a href="#" class="sidebar__link"> Customers </a>

          <a href="#" class="sidebar__link"> Settings </a>
        </nav>
      </aside>

      <!-- Header -->
      <header class="header">
        <div class="header__search">
          <input type="text" placeholder="Search..." />
        </div>

        <div class="header__actions">
          <button>Notifications</button>

          <button>Profile</button>
        </div>
      </header>

      <!-- Main Content -->
      <main class="main">
        <h1>Dashboard Overview</h1>

        <section class="metrics-grid">
          <article class="metric-card">
            <h3>Revenue</h3>
            <p>$48,200</p>
          </article>

          <article class="metric-card">
            <h3>Customers</h3>
            <p>12,430</p>
          </article>

          <article class="metric-card">
            <h3>Conversion</h3>
            <p>5.8%</p>
          </article>

          <article class="metric-card">
            <h3>MRR</h3>
            <p>$9,800</p>
          </article>

          <article class="metric-card">
            <h3>Support Tickets</h3>
            <p>42</p>
          </article>

          <article class="metric-card">
            <h3>Active Users</h3>
            <p>3,201</p>
          </article>
        </section>
      </main>
    </div>
  </body>
</html>
